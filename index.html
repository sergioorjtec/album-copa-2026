var KEYSTORE = "wc26-unlock-v1";
function b64d(s){ var b = atob(s), a = new Uint8Array(b.length); for (var i = 0; i < b.length; i++) a[i] = b.charCodeAt(i); return a; }
function b64e(a){ var s = ""; a = new Uint8Array(a); for (var i = 0; i < a.length; i++) s += String.fromCharCode(a[i]); return btoa(s); }
async function deriveKey(pw){
  var base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);

async function openWith(key){

  document.open(); document.write(htmlText); document.close();

async function tryStored(){
  try {

    if (!raw) return;
